<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscrições · FIEC Educação Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  @property --shimmer { syntax: '<percentage>'; initial-value: -50%; inherits: false; }

  :root {
    --bg:        #050a11;
    --bg-deep:   #02060c;
    --surface:   #0c1825;
    --surface2:  #102233;
    --accent:    #c8882a;
    --accent2:   #f3c674;
    --accent-soft: rgba(200,136,42,.18);
    --blue:      #6cc0e8;
    --green:     #4cd9a5;
    --red:       #ec6a6a;
    --text:      #eef2f7;
    --text-sub:  #7892a8;
    --text-dim:  #314c63;
    --line:      color-mix(in oklch, var(--text) 8%, transparent);
    --line-2:    color-mix(in oklch, var(--text) 14%, transparent);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* mesh background */
  body::before {
    content: '';
    position: fixed; inset: -10%;
    background:
      radial-gradient(420px 360px at 18% 22%, rgba(200,136,42,.10), transparent 60%),
      radial-gradient(520px 480px at 82% 78%, rgba(108,192,232,.06), transparent 65%),
      radial-gradient(400px 320px at 70% 18%, rgba(200,136,42,.05), transparent 60%),
      radial-gradient(380px 340px at 25% 85%, rgba(76,217,165,.04), transparent 65%);
    filter: blur(8px);
    pointer-events: none;
    z-index: 0;
    animation: mesh-drift 28s ease-in-out infinite alternate;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(circle at 1px 1px, rgba(255,255,255,.025) 1px, transparent 0);
    background-size: 28px 28px;
    pointer-events: none; z-index: 0;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, #000, transparent 90%);
  }
  @keyframes mesh-drift {
    0%   { transform: translate(0,0) rotate(0deg); }
    50%  { transform: translate(2%,-1.5%) rotate(.5deg); }
    100% { transform: translate(-1.5%,2%) rotate(-.5deg); }
  }

  /* ── HEADER ── */
  .header {
    position: relative;
    padding: 64px 40px 80px;
    text-align: center;
    overflow: hidden;
    z-index: 1;
    isolation: isolate;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 90% 70% at 50% -10%, rgba(200,136,42,.14), transparent 60%),
      linear-gradient(180deg, rgba(12,24,37,.85) 0%, var(--bg-deep) 100%);
    z-index: -2;
  }
  .header::after {
    content: '';
    position: absolute; top: 50%; left: 50%;
    width: 2px; height: 2px; border-radius: 50%;
    background: transparent;
    box-shadow:
      -480px -180px 0 0 rgba(200,136,42,.5),
      -380px  60px 0 0 rgba(255,255,255,.35),
      -260px 130px 0 0 rgba(255,255,255,.2),
      -220px -150px 0 0 rgba(200,136,42,.4),
       -80px -200px 0 0 rgba(200,136,42,.25),
        20px -110px 0 0 rgba(200,136,42,.45),
        80px  60px 0 0 rgba(255,255,255,.4),
       200px  140px 0 0 rgba(255,255,255,.2),
       320px  110px 0 0 rgba(255,255,255,.3),
       440px  80px 0 0 rgba(255,255,255,.18);
    z-index: -1;
    animation: particles-float 16s ease-in-out infinite alternate;
  }
  @keyframes particles-float {
    from { transform: translate(0,0); }
    to   { transform: translate(20px,-10px); }
  }
  @keyframes spin { to { --angle: 360deg; } }

  .header-inner { position: relative; z-index: 2; }

  .header-eyebrow {
    display: inline-block;
    font-size: .68rem; font-weight: 600;
    letter-spacing: .38em; text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 22px;
    padding: 6px 16px;
    border: 1px solid var(--accent-soft);
    border-radius: 100px;
    background: rgba(200,136,42,.04);
    opacity: 0;
    animation: fadeUp .55s .15s ease-out forwards;
    backdrop-filter: blur(10px);
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(3rem, 9vw, 6rem);
    letter-spacing: -.03em;
    line-height: .9;
    background: linear-gradient(180deg, #fff 0%, #d8e0e8 50%, #8a9aab 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    opacity: 0;
    animation: fadeUp .7s .25s ease-out forwards;
    position: relative;
  }
  .header h1::before {
    content: 'Inscrições 2026';
    position: absolute; inset: 0;
    background: linear-gradient(110deg,
      transparent 30%, var(--accent2) 48%, #fff 50%, var(--accent2) 52%, transparent 70%);
    background-size: 250% 100%;
    background-position: var(--shimmer) 0;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: title-shimmer 6s ease-in-out infinite;
  }
  @keyframes title-shimmer {
    0%,20% { --shimmer: -50%; }
    50%    { --shimmer: 150%; }
    100%   { --shimmer: 150%; }
  }

  .header-ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 18px; margin: 26px auto;
    opacity: 0; animation: fadeUp .5s .35s ease-out forwards;
  }
  .header-ornament-line { width: 56px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent)); }
  .header-ornament-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 12px var(--accent), 0 0 4px #fff;
    animation: dot-pulse 2.4s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%,100% { box-shadow: 0 0 12px var(--accent), 0 0 4px #fff; }
    50%     { box-shadow: 0 0 22px var(--accent2), 0 0 8px #fff; transform: scale(1.15); }
  }

  .header-sub {
    font-size: 1rem; color: var(--text-sub); font-weight: 300;
    letter-spacing: .04em;
    opacity: 0; animation: fadeUp .5s .42s ease-out forwards;
  }

  /* ── INFOS DE DATA ── */
  .datas-section {
    position: relative; z-index: 1;
    display: flex; justify-content: center;
    gap: 14px; flex-wrap: wrap;
    padding: 0 40px 56px;
    opacity: 0; animation: fadeUp .55s .5s ease-out forwards;
  }
  .data-chip {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(90deg, rgba(200,136,42,.08), rgba(200,136,42,.03));
    border: 1px solid var(--accent-soft);
    border-radius: 100px;
    padding: 10px 20px;
    font-size: .84rem; color: var(--text-sub); line-height: 1.3;
  }
  .data-chip-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent2); flex-shrink: 0;
    box-shadow: 0 0 8px var(--accent2);
    animation: dot-pulse 2.4s ease-in-out infinite;
  }
  .data-chip strong { color: var(--accent2); font-weight: 600; }

  /* ── GRID DE POLOS ── */
  .container {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 0 40px 100px;
  }

  .section-label {
    font-size: .68rem; font-weight: 600;
    letter-spacing: .38em; text-transform: uppercase;
    color: var(--text-dim); text-align: center;
    margin-bottom: 36px;
    opacity: 0; animation: fadeUp .5s .55s ease-out forwards;
  }

  .polos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }

  .polo-card {
    position: relative;
    background: linear-gradient(135deg, rgba(18,34,51,.85), rgba(12,24,37,.7));
    border: 1px solid var(--line-2);
    border-radius: 18px;
    padding: 28px 26px 24px;
    text-decoration: none;
    color: var(--text);
    display: flex; flex-direction: column; gap: 12px;
    overflow: hidden;
    isolation: isolate;
    opacity: 0;
    transform: translateY(18px);
    transition: transform .4s cubic-bezier(.34,1.56,.64,1), border-color .35s, box-shadow .35s, background .35s, opacity .35s;
  }
  .polo-card.visible { opacity: 1; transform: translateY(0); }

  /* borda conic no hover */
  .polo-card::before {
    content: '';
    position: absolute; inset: -1px;
    border-radius: inherit;
    background: conic-gradient(from var(--angle),
      var(--accent2), var(--accent), transparent 25%, transparent 75%, var(--accent), var(--accent2));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    padding: 1px; opacity: 0; transition: opacity .35s; z-index: -1;
  }
  .polo-card::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle 280px at 50% 0%, rgba(200,136,42,.15), transparent 50%);
    opacity: 0; transition: opacity .35s; pointer-events: none; z-index: 0;
  }
  .polo-card:hover {
    transform: translateY(-6px) scale(1.015);
    border-color: transparent;
    background: linear-gradient(135deg, rgba(22,42,62,.95), rgba(16,30,46,.85));
    box-shadow: 0 24px 70px rgba(0,0,0,.6), 0 0 0 1px rgba(200,136,42,.15);
    --angle: 360deg;
    transition-property: transform, border-color, box-shadow, background, opacity, --angle;
    transition-duration: .4s, .35s, .35s, .35s, .35s, 5s;
  }
  .polo-card:hover::before { opacity: 1; }
  .polo-card:hover::after  { opacity: 1; }
  .polo-card > * { position: relative; z-index: 1; }

  .polo-card-tag {
    font-family: 'DM Mono', monospace;
    font-size: .62rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--accent2); font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .polo-card-tag::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--accent); transform: rotate(45deg);
  }

  .polo-card h3 {
    font-family: 'Playfair Display', serif;
    font-weight: 700; font-size: 1.5rem;
    letter-spacing: -.01em; line-height: 1.1;
  }

  .polo-card-end {
    font-size: .82rem; color: var(--text-sub);
    font-weight: 300; line-height: 1.5;
    text-wrap: pretty;
  }

  .polo-card-badge {
    display: inline-block;
    background: rgba(200,136,42,.1);
    border: 1px solid var(--accent-soft);
    color: var(--accent2);
    font-size: .65rem; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    padding: 3px 10px; border-radius: 4px;
    align-self: flex-start;
  }

  .polo-card-cta {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: .76rem; font-weight: 600;
    letter-spacing: .16em; text-transform: uppercase;
    color: var(--blue); margin-top: auto;
    transition: color .3s, gap .3s;
  }
  .polo-card:hover .polo-card-cta { color: var(--accent2); gap: 14px; }
  .polo-card-cta svg {
    width: 11px; height: 11px;
    fill: none; stroke: currentColor;
    stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;
    transition: transform .3s;
  }
  .polo-card:hover .polo-card-cta svg { transform: translateX(3px); }

  /* loading */
  .loading-polos {
    grid-column: 1/-1;
    text-align: center; padding: 60px 20px;
    color: var(--text-dim);
    font-size: .8rem; letter-spacing: .2em; text-transform: uppercase;
  }

  /* footer */
  footer {
    position: relative; z-index: 1;
    padding: 32px 24px; text-align: center;
    color: var(--text-dim); font-size: .68rem;
    letter-spacing: .26em; text-transform: uppercase;
    border-top: 1px solid var(--line); font-weight: 500;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 820px) {
    .header { padding: 48px 24px 60px; }
    .datas-section { padding: 0 24px 44px; flex-direction: column; align-items: center; }
    .container { padding: 0 20px 80px; }
    .polos-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .polos-grid { grid-template-columns: 1fr; }
    .header h1 { font-size: 2.8rem; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <span class="header-eyebrow">Programa de Educação Digital · 2026</span>
    <h1 id="tituloInscricoes">Inscrições 2026</h1>
    <div class="header-ornament">
      <div class="header-ornament-line"></div>
      <div class="header-ornament-dot"></div>
      <div class="header-ornament-line" style="background:linear-gradient(90deg,rgba(200,136,42,.5),transparent)"></div>
    </div>
    <p class="header-sub">FIEC · Fundação Indaiatubana de Educação e Cultura</p>
  </div>
</header>

<!-- DATAS -->
<div class="datas-section">
  <div class="data-chip">
    <div class="data-chip-dot"></div>
    Aulas de <strong>2ª e 4ª feira</strong> começam em <strong>03/08/2026</strong>
  </div>
  <div class="data-chip">
    <div class="data-chip-dot"></div>
    Aulas de <strong>3ª e 5ª feira</strong> começam em <strong>04/08/2026</strong>
  </div>
</div>

<!-- POLOS -->
<div class="container">
  <p class="section-label">Escolha uma unidade</p>
  <div class="polos-grid" id="polosGrid">
    <div class="loading-polos">Carregando polos...</div>
  </div>
</div>

<footer>Programa de Educação Digital · FIEC · II Semestre 2026</footer>

<script>
const VERCEL_URL = 'https://admin-fiec.vercel.app/api/switch';
const POLO_URL   = 'https://admin-fiec.vercel.app/polo.html';

// Badges especiais por polo (só isso fica hardcoded)
const BADGES = {
  'polo-bem-viver': 'Acima de 60 anos',
};

function formatarId(id) {
  return 'Polo ' + id.replace('polo-', '').split('-')
    .map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
}

async function carregarPolos() {
  const grid = document.getElementById('polosGrid');

  try {
    const r = await fetch(VERCEL_URL);
    const d = await r.json();

    const turmas    = d.turmas      || {};
    const polos     = d.polosStatus || {};
    const enderecos = d.enderecos   || {};
    const nomes     = d.nomes       || {};
    const configs   = d.configs     || {};

    // Atualiza datas e título do Edge Config
    if (configs.titulo) document.getElementById('tituloInscricoes').textContent = configs.titulo;
    if (configs.data24) document.getElementById('data24').textContent = configs.data24;
    if (configs.data35) document.getElementById('data35').textContent = configs.data35;

    // Usa polosStatus como fonte de verdade — evita polos fantasma
    const ids = Object.keys(polos);
    if (ids.length === 0) {
      grid.innerHTML = '<div class="loading-polos">Nenhum polo disponível no momento.</div>';
      return;
    }

    grid.innerHTML = '';
    ids.forEach((id, i) => {
      const nome = nomes[id] || formatarId(id);
      const end  = enderecos[id] || '';
      const badge = BADGES[id] || '';

      const card = document.createElement('a');
      card.className = 'polo-card';
      card.href = `${POLO_URL}?id=${id}`;
      card.innerHTML = `
        <span class="polo-card-tag">Unidade</span>
        ${badge ? `<span class="polo-card-badge">${badge}</span>` : ''}
        <h3>${nome}</h3>
        <p class="polo-card-end">${end.replace(/\n/g, '<br>')}</p>
        <span class="polo-card-cta">
          Acessar polo
          <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/></svg>
        </span>
      `;
      grid.appendChild(card);
      setTimeout(() => card.classList.add('visible'), 80 * i);
    });

  } catch(e) {
    grid.innerHTML = '<div class="loading-polos">Erro ao carregar polos.</div>';
  }
}

carregarPolos();
</script>
</body>
</html>
