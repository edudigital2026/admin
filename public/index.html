<!DOCTYPE html>
<!-- LOGIN - FIEC Admin -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Admin FIEC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #050a11;
    --surface: #0c1825;
    --accent:  #c8882a;
    --green:   #4cd9a5;
    --red:     #ec6a6a;
    --text:    #eef2f7;
    --sub:     #7892a8;
    --line:    rgba(255,255,255,.07);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 44px 40px;
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 24px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; font-weight: 900;
    letter-spacing: .3em; color: var(--accent);
    text-transform: uppercase;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 700; line-height: 1.1;
  }
  h1 span { color: var(--accent); font-style: italic; }

  .field { display: flex; flex-direction: column; gap: 7px; }

  label {
    font-size: .72rem; font-weight: 600;
    letter-spacing: .18em; text-transform: uppercase; color: var(--sub);
  }

  input[type="password"] {
    background: var(--bg); border: 1px solid var(--line); border-radius: 9px;
    padding: 11px 14px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: .95rem;
    outline: none; width: 100%; transition: border-color .2s;
  }
  input:focus { border-color: var(--accent); }

  .btn {
    padding: 12px 22px; border-radius: 9px; border: none;
    font-family: 'DM Sans', sans-serif; font-weight: 600;
    font-size: .88rem; letter-spacing: .06em; cursor: pointer;
    transition: opacity .2s, transform .15s; text-transform: uppercase;
    width: 100%;
  }
  .btn:hover { opacity: .85; transform: translateY(-1px); }
  .btn-accent { background: var(--accent); color: var(--bg); }

  .msg {
    padding: 10px 16px; border-radius: 8px; font-size: .85rem; display: none;
  }
  .msg.err { background: rgba(236,106,106,.1); color: var(--red); border: 1px solid rgba(236,106,106,.2); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">FIEC</div>
  <h1>Painel <span>Admin</span></h1>
  <div class="field">
    <label>Senha</label>
    <input type="password" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')entrar()">
  </div>
  <button class="btn btn-accent" onclick="entrar()">Entrar</button>
  <div class="msg" id="msg"></div>
</div>

<script>
// Se já tem senha salva, vai direto para o admin
const senhaSalva = localStorage.getItem('fiec_admin_senha');
if (senhaSalva) {
  window.location.href = '/admin.html';
}

async function entrar() {
  const senha = document.getElementById('senha').value;
  if (!senha) return mostrarErro('Digite a senha');

  // Verifica a senha antes de redirecionar
  try {
    const r = await fetch('/api/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ senha, status: 'ABERTO' })
    });
    const d = await r.json();

    if (d.error === 'Senha incorreta') {
      return mostrarErro('Senha incorreta');
    }

    // Senha ok — salva e redireciona
    localStorage.setItem('fiec_admin_senha', senha);
    window.location.href = '/admin.html';
  } catch(e) {
    mostrarErro('Erro de conexão');
  }
}

function mostrarErro(texto) {
  const el = document.getElementById('msg');
  el.textContent = texto;
  el.className = 'msg err';
  el.style.display = 'block';
}
</script>
</body>
</html>
